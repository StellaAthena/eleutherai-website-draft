people:
  title: "Meet Our Community"
  items:
    - name: "Naomi Saphra"
      date: "15 November 2023"
      image: "https://images.squarespace-cdn.com/content/v1/6343e7de9a7c4b05ef290bd4/1700767002336-5ZVY0SG3I7NIKRDXOM11/naomi.jpg"
      quote: "We have two choices as a society. The first is to accept that one company will eventually emerge dominant with a monopoly on the models that shape our world. The other is to commit to public open source models."
    - name: "Mohammad Aflah Khan"
      date: "21 September 2023"
      image: "https://images.squarespace-cdn.com/content/v1/6343e7de9a7c4b05ef290bd4/1696774265472-P3AH1QOFWDZPYHFJK27G/mohammad.jpg"
      quote: "Open research communities let people outside a small number of institutions make real contributions to frontier AI research."
