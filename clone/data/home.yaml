    text: "How do properties of models emerge and evolve over the course of training?"
  - title: "Eliciting Latent Knowledge"
    url: "/projects/elk"
    image: "https://images.squarespace-cdn.com/content/v1/6343e7de9a7c4b05ef290bd4/1672375347709-Q7V80U1D7D45WQP6ZA1U/003150.2613265820.png"
    text: "As models get smarter, humans won't always be able to independently check if a model's claims are true or false. We aim to circumvent this issue by directly eliciting latent knowledge (ELK) inside the model's activations."
  - title: "Training LLMs"
    url: "/projects/training-large-language-models"
