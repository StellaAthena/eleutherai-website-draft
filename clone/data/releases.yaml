items:
  - title: "trlX"
    type: "Library"
    url: "https://github.com/CarperAI/trlx"
    text: "A repo for distributed training of language models with Reinforcement Learning via Human Feedback (RLHF)."
  - title: "Proof-Pile-2"
    type: "Dataset"
    url: "https://huggingface.co/datasets/EleutherAI/proof-pile-2"
    text: "A 55 billion token dataset of mathematical and scientific documents, created for training the LLeMA models."
  - title: "LLeMA"
    type: "Model"
    url: "https://github.com/EleutherAI/math-lm"
    text: "Language models for mathematical applications."
  - title: "OpenWebMath"
    type: "Dataset"
    url: "https://www.eleuther.ai/artifacts/openwebmath"
    text: "A 14.7B token dataset of high quality English mathematical text."
  - title: "Pythia"
    type: "Model"
    url: "https://github.com/EleutherAI/pythia"
    text: "A suite of models designed to enable controlled scientific research on transparently trained LLMs."
  - title: "tuned-lens"
    type: "Library"
    url: "https://github.com/norabelrose/tuned-lens"
    text: "A library implementing the Tuned Lens, along with other tools for extracting, manipulating, and studying the learned representations of transformers across layers."
  - title: "SD Upscaler"
    type: "Model"
    url: "https://colab.research.google.com/drive/1o1qYJcFeywzCIdkfKJy7cTpgZTCM2EI4"
    text: "A diffusion-based model for upscaling images to higher resolution, trained by Katherine Crowson in collaboration with Stability AI."
  - title: "Polyglot-Ko"
    type: "Model"
    url: "https://github.com/EleutherAI/polyglot"
    text: "A series of Korean autoregressive language models made by the EleutherAI polyglot team."
