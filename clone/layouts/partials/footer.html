<footer class="site-footer">
  <div class="footer-inner">
    <nav class="footer-links" aria-label="Footer navigation">
      {{ range .Site.Data.site.footer_nav }}
        <a href="{{ .url | safeURL }}">{{ .label }}</a>
      {{ end }}
    </nav>
    <div class="footer-contact">
      <a href="mailto:contact@eleuther.ai">contact@eleuther.ai</a>
    </div>
    <div class="social-links" aria-label="Social links">
      {{ range .Site.Data.site.social }}
        <a href="{{ .url | safeURL }}" target="_blank" rel="noopener">{{ .label }}</a>
      {{ end }}
    </div>
    <p class="copyright">Copyright EleutherAI 2023</p>
  </div>
</footer>
