{{ define "main" }}
  <section class="page-hero center">
    <h1>{{ .Title }}</h1>
  </section>
  <section class="page-section">
    <div class="summary-list">
      {{ range .Site.Data.releases.items }}
        {{ partial "summary-row.html" (dict "title" .title "meta" .type "url" .url "text" .text) }}
      {{ end }}
    </div>
  </section>
{{ end }}
