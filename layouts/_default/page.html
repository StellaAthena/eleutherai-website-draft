{{ define "main" }}
<main>
  <section class="hero">

      <h1>{{ .Title }}</h1>
      {{ with .Params.lede }}<p class="lede">{{ . }}</p>{{ end }}
    </div>
  </section>

  <section class="section">
    <div class="wrap">
      <div class="prose article-body">
        {{ .Content }}
      </div>
    </div>
  </section>
</main>
{{ end }}
