{{ define "main" }}
<main>
  <section class="hero">
    <div class="wrap">
      <h1>{{ .Title }}</h1>
      {{ with .Params.lede }}<p class="lede">{{ . }}</p>{{ end }}
    </div>
  </section>

  {{ with .Content }}
    <section class="section research-goals">
      <div class="wrap">
        <div class="section-head">
          <div><h2>Research goals</h2></div>
          <div class="prose">
            {{ . }}
          </div>
        </div>
      </div>
    </section>
  {{ end }}

  <section class="section" id="publications">
    <div class="wrap">
      <div class="section-head">
        <div><h2>Recent Publications</h2></div>
      </div>
      <div class="publication-list">
        {{ range first 50 site.Data.research.papers }}
          {{ partial "publication-row.html" . }}
        {{ end }}
      </div>
    </div>
  </section>
</main>
{{ end }}
